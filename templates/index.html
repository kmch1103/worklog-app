<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작업일지 v2</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-title">작업일지 v2</div>

      <nav class="sidebar-menu">
        <button id="menuCalendar" class="menu-btn active" type="button">작업달력</button>
        <button id="menuWorklog" class="menu-btn" type="button">작업일지</button>
        <button id="menuMaterials" class="menu-btn" type="button">자재관리</button>
        <button id="menuMoney" class="menu-btn" type="button">금전관리</button>
        <button id="menuOptions" class="menu-btn" type="button">옵션관리</button>
        <button id="menuExcel" class="menu-btn" type="button">엑셀다운</button>
        <button id="menuBackup" class="menu-btn" type="button">백업</button>
      </nav>
    </aside>

    <main class="content">
      <!-- 작업달력 -->
      <section id="pageCalendar" class="page-section">
        <div class="page-header">
          <h1 class="page-title">작업달력</h1>
          <div class="page-header-actions">
            <button id="calendarPrevBtn" type="button" class="soft-btn">이전달</button>
            <div id="calendarMonthLabel" class="month-label"></div>
            <button id="calendarNextBtn" type="button" class="soft-btn">다음달</button>
          </div>
        </div>

        <div class="calendar-weekdays">
          <div>일</div>
          <div>월</div>
          <div>화</div>
          <div>수</div>
          <div>목</div>
          <div>금</div>
          <div>토</div>
        </div>

        <div class="calendar-layout">
          <div class="calendar-main-card">
            <div id="calendarGrid" class="calendar-grid"></div>
          </div>

          <div class="calendar-side-card">
            <div id="calendarSidePanel"></div>
          </div>
        </div>
      </section>

      <!-- 작업일지 -->
      <section id="pageWorklog" class="page-section" style="display:none;">
        <div class="page-header page-header-stack">
          <div>
            <h1 class="page-title">작업일지</h1>
          </div>
          <div class="worklog-topbar">
            <input id="worklogSearchInput" type="text" class="text-input" placeholder="작업내용, 작물, 병충해, 자재, 비고 검색" />
            <button id="worklogSearchBtn" type="button" class="soft-btn">검색</button>
            <button id="worklogSearchResetBtn" type="button" class="soft-btn">초기화</button>
            <button id="worklogAddBtn" type="button" class="primary-btn">작업입력</button>
          </div>
        </div>

        <div id="worklogList" class="worklog-list"></div>
      </section>

      <!-- 자재관리 -->
      <section id="pageMaterials" class="page-section" style="display:none;">
        <div class="page-header page-header-stack">
          <div>
            <h1 class="page-title">자재관리</h1>
          </div>
          <div class="worklog-topbar">
            <input id="materialPageSearchInput" type="text" class="text-input" placeholder="자재명 검색" />
            <button id="materialPageSearchBtn" type="button" class="soft-btn">검색</button>
            <button id="materialPageSearchResetBtn" type="button" class="soft-btn">초기화</button>
            <button id="materialAddBtn" type="button" class="primary-btn">자재추가</button>
          </div>
        </div>

        <div id="materialsSummary" class="summary-line"></div>

        <div class="materials-sections">
          <section class="materials-block">
            <h2 class="section-title">재고 있음</h2>
            <div id="materialsInStockWrap" class="materials-grid"></div>
          </section>

          <section class="materials-block">
            <h2 class="section-title">재고 없음</h2>
            <div id="materialsOutStockWrap" class="materials-grid"></div>
          </section>
        </div>
      </section>

      <!-- 금전관리 -->
      <section id="pageMoney" class="page-section" style="display:none;">
        <div class="page-header">
          <h1 class="page-title">금전관리</h1>
        </div>
        <div class="empty-page-card">금전관리 화면은 다음 단계에서 연결합니다.</div>
      </section>

      <!-- 옵션관리 -->
      <section id="pageOptions" class="page-section" style="display:none;">
        <div class="page-header page-header-stack">
          <div>
            <h1 class="page-title">옵션관리</h1>
          </div>
          <div class="option-toolbar">
            <div id="optionTypeTabs" class="option-tabs">
              <button type="button" class="soft-btn active" data-option-type="weather">날씨</button>
              <button type="button" class="soft-btn" data-option-type="crops">작물</button>
              <button type="button" class="soft-btn" data-option-type="tasks">작업내용</button>
              <button type="button" class="soft-btn" data-option-type="pests">병충해</button>
              <button type="button" class="soft-btn" data-option-type="materials">자재</button>
              <button type="button" class="soft-btn" data-option-type="machines">기계</button>
            </div>
            <button id="optionAddBtn" type="button" class="primary-btn">옵션추가</button>
          </div>
        </div>

        <div id="optionListWrap" class="option-list"></div>
      </section>

      <!-- 엑셀다운 -->
      <section id="pageExcel" class="page-section" style="display:none;">
        <div class="page-header">
          <h1 class="page-title">엑셀다운</h1>
        </div>
        <div class="empty-page-card">엑셀 다운로드 기능은 서버 연결 단계에서 마무리합니다.</div>
      </section>

      <!-- 백업 -->
      <section id="pageBackup" class="page-section" style="display:none;">
        <div class="page-header">
          <h1 class="page-title">백업</h1>
        </div>
        <div class="empty-page-card">백업 기능은 다음 단계에서 연결합니다.</div>
      </section>
    </main>
  </div>

  <!-- 작업일지 입력/수정 모달 -->
  <div id="workModal" class="modal-overlay" style="display:none;">
    <div class="modal-card modal-large">
      <div class="modal-header">
        <h2 id="workModalTitle">작업일지 입력</h2>
        <button id="workCloseBtn" type="button" class="icon-close">×</button>
      </div>

      <form id="workForm" class="work-form">
        <input type="hidden" id="workId" />

        <section class="form-block">
          <h3 class="form-title">기본정보</h3>
          <div class="form-grid two-col">
            <div class="form-field">
              <label for="workStartDate">시작일</label>
              <input id="workStartDate" type="date" class="text-input" />
            </div>
            <div class="form-field">
              <label for="workEndDate">종료일</label>
              <input id="workEndDate" type="date" class="text-input" />
            </div>
            <div class="form-field">
              <label for="workWeather">날씨</label>
              <select id="workWeather" class="text-input"></select>
            </div>
            <div class="form-field">
              <label for="workTaskName">작업내용</label>
              <input id="workTaskName" type="text" class="text-input" placeholder="예: 방제 작업" />
            </div>
            <div class="form-field">
              <label for="workHours">작업시간</label>
              <input id="workHours" type="text" class="text-input" placeholder="예: 4시간" />
            </div>
          </div>
        </section>

        <section class="form-block">
          <h3 class="form-title">다중선택</h3>

          <div class="form-field">
            <label>작물</label>
            <div id="cropOptionsWrap" class="chip-check-wrap"></div>
          </div>

          <div class="form-field">
            <label>병충해</label>
            <div id="pestOptionsWrap" class="chip-check-wrap"></div>
          </div>

          <div class="form-field">
            <label>사용기계</label>
            <div id="machineOptionsWrap" class="chip-check-wrap"></div>
          </div>
        </section>

        <section class="form-block">
          <h3 class="form-title">사용자재</h3>

          <div class="form-field">
            <label for="materialSearchInput">자재 검색</label>
            <input id="materialSearchInput" type="text" class="text-input" placeholder="자재명 입력 후 선택" />
          </div>

          <div id="materialSearchResults" class="material-search-results"></div>

          <div class="selected-materials-block">
            <div class="sub-title">선택된 자재</div>
            <div id="selectedMaterialsWrap"></div>
          </div>
        </section>

        <section class="form-block">
          <h3 class="form-title">인건비 상세</h3>
          <div id="laborRowsWrap" class="labor-rows-wrap"></div>
          <div class="inline-actions">
            <button id="addLaborRowBtn" type="button" class="soft-btn">행추가</button>
          </div>
        </section>

        <section class="form-block">
          <h3 class="form-title">비고</h3>
          <div class="form-field">
            <textarea id="workMemo" class="text-area" rows="4" placeholder="비고를 입력하세요"></textarea>
          </div>
        </section>

        <div class="modal-footer">
          <button id="workSaveBtn" type="submit" class="primary-btn">저장</button>
          <button id="workCloseBtn2" type="button" class="soft-btn">닫기</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var closeBtn2 = document.getElementById('workCloseBtn2');
      var modal = document.getElementById('workModal');
      if (closeBtn2 && modal) {
        closeBtn2.addEventListener('click', function () {
          modal.style.display = 'none';
        });
      }
    });
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
