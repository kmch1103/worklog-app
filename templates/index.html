<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>작업일지 v2</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>작업일지 v2</h1>
      <button class="menu-btn active" data-page="calendar">작업달력</button>
      <button class="menu-btn" data-page="works">작업일지</button>
      <button class="menu-btn" data-page="materials">자재관리</button>
      <button class="menu-btn" data-page="money">금전관리</button>
      <button class="menu-btn" data-page="options">옵션관리</button>
      <button class="menu-btn" data-page="excel">엑셀다운</button>
      <button class="menu-btn" data-page="backup">백업</button>
    </aside>

    <main class="content">
      <section id="page-calendar" class="page active">
        <div class="page-header">
          <h2>작업달력</h2>
          <div class="calendar-toolbar">
            <button id="btn-prev-month" class="btn">이전달</button>
            <div id="calendar-title" class="calendar-title"></div>
            <button id="btn-next-month" class="btn">다음달</button>
          </div>
        </div>

        <div class="calendar-layout">
          <div class="panel">
            <div class="calendar-week-header">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
          </div>

          <div class="panel">
            <div class="date-panel-header">
              <h3 id="selected-date-title">날짜를 선택하세요</h3>
              <div class="date-panel-actions">
                <button id="btn-open-work-from-calendar" class="btn primary hidden">실적 입력</button>
                <button id="btn-open-plan-form" class="btn hidden">작업계획 입력</button>
              </div>
            </div>

            <div class="split-title">작업계획</div>
            <div id="selected-date-plan-list" class="calendar-day-list"></div>

            <div class="split-title">작업실적</div>
            <div id="selected-date-list" class="calendar-day-list"></div>
          </div>
        </div>
      </section>

      <section id="page-works" class="page">
        <div class="page-header">
          <h2>작업일지</h2>
          <button id="btn-new-work" class="btn primary">새 작업 입력</button>
        </div>

        <div id="works-list" class="cards"></div>
      </section>

      <section id="page-materials" class="page">
        <div class="page-header">
          <h2>자재관리</h2>
          <div class="page-header-actions">
            <button id="btn-open-material-modal" class="btn primary">+ 자재 추가</button>
          </div>
        </div>

        <div id="materials-list"></div>
      </section>

      <section id="page-money" class="page">
        <div class="page-header"><h2>금전관리</h2></div>
        <div class="panel">
          <p class="placeholder-title">준비중</p>
          <p class="placeholder-text">금전관리 화면은 수입/지출/월별정산 기능을 붙일 예정입니다.</p>
        </div>
      </section>

      <section id="page-options" class="page">
        <div class="page-header"><h2>옵션관리</h2></div>

        <div class="options-grid">
          <div class="panel">
            <h3>날씨</h3>
            <div class="inline-form">
              <input type="text" id="new-weather" placeholder="새 날씨">
              <button class="btn primary" onclick="saveOption('weather', 'new-weather')">추가</button>
            </div>
            <div id="options-weather" class="option-list"></div>
          </div>

          <div class="panel">
            <h3>작물</h3>
            <div class="inline-form">
              <input type="text" id="new-crops" placeholder="새 작물">
              <button class="btn primary" onclick="saveOption('crops', 'new-crops')">추가</button>
            </div>
            <div id="options-crops" class="option-list"></div>
          </div>

          <div class="panel">
            <h3>작업내용</h3>
            <div class="inline-form">
              <input type="text" id="new-tasks" placeholder="새 작업내용">
              <button class="btn primary" onclick="saveOption('tasks', 'new-tasks')">추가</button>
            </div>
            <div id="options-tasks" class="option-list"></div>
          </div>

          <div class="panel">
            <h3>병충해</h3>
            <div class="inline-form">
              <input type="text" id="new-pests" placeholder="새 병충해">
              <button class="btn primary" onclick="saveOption('pests', 'new-pests')">추가</button>
            </div>
            <div id="options-pests" class="option-list"></div>
          </div>

          <div class="panel">
            <h3>사용자재</h3>
            <div class="inline-form">
              <input type="text" id="new-materials" placeholder="새 사용자재 옵션">
              <button class="btn primary" onclick="saveOption('materials', 'new-materials')">추가</button>
            </div>
            <div id="options-materials" class="option-list"></div>
          </div>

          <div class="panel">
            <h3>사용기계</h3>
            <div class="inline-form">
              <input type="text" id="new-machines" placeholder="새 사용기계">
              <button class="btn primary" onclick="saveOption('machines', 'new-machines')">추가</button>
            </div>
            <div id="options-machines" class="option-list"></div>
          </div>
        </div>
      </section>

      <section id="page-excel" class="page">
        <div class="page-header"><h2>엑셀다운</h2></div>
        <div class="panel">
          <p class="placeholder-title">준비중</p>
          <p class="placeholder-text">엑셀 다운로드 기능은 다음 단계에서 연결할 예정입니다.</p>
        </div>
      </section>

      <section id="page-backup" class="page">
        <div class="page-header"><h2>백업</h2></div>
        <div class="panel">
          <p class="placeholder-title">준비중</p>
          <p class="placeholder-text">백업/복원 기능은 다음 단계에서 연결할 예정입니다.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 작업계획 팝업 -->
  <div id="plan-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="plan-modal-title">작업계획 입력</h3>
        <button id="btn-close-plan-modal" class="btn">닫기</button>
      </div>

      <div class="modal-body">
        <label class="field">
          <span>계획일</span>
          <input type="date" id="plan_date">
        </label>

        <label class="field">
          <span>계획 제목</span>
          <select id="plan_title">
            <option value="">선택</option>
          </select>
        </label>

        <label class="field">
          <span>세부내용</span>
          <textarea id="plan_details" rows="4" placeholder="예: 상단동 2시간 관수"></textarea>
        </label>

        <label class="field">
          <span>상태</span>
          <select id="plan_status">
            <option value="planned">계획</option>
            <option value="done">완료</option>
            <option value="cancelled">취소</option>
          </select>
        </label>
      </div>

      <div class="modal-footer">
        <button id="btn-save-plan" class="btn primary">계획 저장</button>
        <button id="btn-cancel-plan" class="btn">취소</button>
      </div>
    </div>
  </div>

  <!-- 새작업 입력 팝업 -->
  <div id="work-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box-large">
      <div class="modal-header">
        <h3 id="work-modal-title">새 작업 입력</h3>
        <button id="btn-close-work-modal" class="btn">닫기</button>
      </div>

      <div class="modal-body">
        <div class="grid two">
          <label class="field">
            <span>시작일</span>
            <input type="date" id="start_date">
          </label>
          <label class="field">
            <span>종료일</span>
            <input type="date" id="end_date">
          </label>
        </div>

        <div class="grid two">
          <label class="field">
            <span>날씨</span>
            <select id="weather"></select>
          </label>
          <label class="field">
            <span>작업내용</span>
            <select id="task_name"></select>
          </label>
        </div>

        <div class="field">
          <span>작물</span>
          <div id="crops-box" class="checks"></div>
        </div>

        <div class="field">
          <span>병충해</span>
          <div id="pests-box" class="checks"></div>
        </div>

        <div class="field">
          <span>사용자재</span>
          <div id="material-picker-wrap">
            <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
              <input type="text" id="material-search-input" placeholder="자재명 검색" style="padding:8px 10px; border:1px solid #ccc; border-radius:8px; min-width:220px;">
            </div>
            <div id="material-search-results" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;"></div>
            <div id="selected-materials-detailed"></div>
          </div>
        </div>

        <div class="field">
          <span>사용기계</span>
          <div id="machines-box" class="checks"></div>
        </div>

        <div class="field">
          <span>인건비 상세</span>
          <div id="labor-rows-wrap"></div>
          <div style="margin-top:8px;">
            <button type="button" class="btn" id="btn-add-labor-row">행추가</button>
          </div>
        </div>

        <div class="grid two">
          <label class="field" style="display:none;">
            <span>인건비</span>
            <input type="number" id="labor_cost" min="0" step="1000" value="0">
          </label>
          <label class="field">
            <span>작업시간</span>
            <input type="number" id="work_hours" min="0" step="0.5" value="0">
          </label>
        </div>

        <label class="field">
          <span>비고</span>
          <textarea id="memo" rows="4"></textarea>
        </label>

        

<div class="field money-field-wrap">
  <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
    <input type="checkbox" id="has_money">
    <span>비용 발생</span>
  </label>
</div>

<div id="money-box" class="panel hidden" style="margin-top:10px; padding:14px;">
  <div class="grid two">
    <label class="field">
      <span>비용구분</span>
      <select id="money_type">
        <option value="">선택</option>
        <option value="자재">자재</option>
        <option value="인건비">인건비</option>
        <option value="기타">기타</option>
      </select>
    </label>

    <label class="field">
      <span>금액</span>
      <input type="number" id="money_amount" min="0" step="100" value="0">
    </label>
  </div>

  <div class="grid two">
    <label class="field">
      <span>결제방식</span>
      <select id="money_method">
        <option value="">선택</option>
        <option value="현금">현금</option>
        <option value="계좌이체">계좌이체</option>
        <option value="카드일시불">카드일시불</option>
        <option value="카드할부">카드할부</option>
        <option value="외상">외상</option>
      </select>
    </label>

    <label class="field">
      <span>금전비고</span>
      <input type="text" id="money_note" placeholder="예: 농약값, 일당, 수리비">
    </label>
  </div>
</div>


        
      </div>

      <div class="modal-footer">
        <button id="btn-save-work" class="btn primary">저장</button>
        <button id="btn-cancel-work" class="btn">취소</button>
      </div>
    </div>
  </div>

  <!-- 자재등록 팝업 -->
  <div id="material-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box-material">
      <div class="modal-header">
        <h3 id="material-modal-title">자재 등록</h3>
        <button id="btn-close-material-modal" class="btn">닫기</button>
      </div>

      <div class="modal-body">
        <label class="field">
          <span>자재 검색</span>
          <input type="text" id="material-search-keyword" placeholder="자재명 검색">
        </label>

        <div id="material-search-box" class="panel" style="max-height:160px; overflow:auto; padding:6px; margin-bottom:12px;"></div>

        <div class="grid two">
          <label class="field">
            <span>자재명</span>
            <input type="text" id="material_name" placeholder="예: 기계유제">
          </label>
          <label class="field">
            <span>단위</span>
            <select id="material_unit">
              <option value="">선택</option>
              <option value="개">개</option>
              <option value="병">병</option>
              <option value="통">통</option>
              <option value="봉">봉</option>
              <option value="포">포</option>
              <option value="kg">kg</option>
              <option value="L">L</option>
              <option value="ml">ml</option>
              <option value="말">말</option>
            </select>
          </label>
        </div>

        <div class="grid two">
          <label class="field">
            <span>재고수량</span>
            <input type="number" id="material_stock" min="0" step="0.1" value="0">
          </label>
          <label class="field">
            <span>단가</span>
            <input type="number" id="material_price" min="0" step="100" value="0">
          </label>
        </div>

        <label class="field">
          <span>메모</span>
          <input type="text" id="material_memo" placeholder="필요 시 메모 입력">
        </label>
      </div>

      <div class="modal-footer">
        <button id="btn-save-material" class="btn primary">저장</button>
        <button id="btn-cancel-material" class="btn">닫기</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
