<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>작업일지</title>

<style>
body { font-family: 맑은고딕; margin:0; background:#f5f6fa; }

.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#1f2937; color:white; padding:20px;
}

.menu-btn {
    display:block; width:100%;
    padding:12px; margin-bottom:10px;
    background:#374151; border:none; color:white;
}

.content {
    margin-left:240px; padding:20px;
}

.card {
    background:white; padding:15px;
    border-radius:10px; margin-bottom:10px;
    cursor:pointer;
}

.card.selected {
    border:2px solid blue;
}
</style>
</head>

<body>

<!-- 좌측 메뉴 (기존 유지, 입력만 제거) -->
<div class="sidebar">
    <h2>작업일지</h2>
    <button class="menu-btn">작업일지</button>
</div>

<div class="content">

<!-- 상단 버튼 -->
<div>
    <button onclick="openCreate()">입력</button>
    <button onclick="editWork()">수정</button>
    <button onclick="deleteWork()">삭제</button>
</div>

<!-- 입력 영역 -->
<div id="editor" style="display:none; margin-top:20px;">

<input id="task" placeholder="작업내용"><br><br>

날씨:
<label><input type="checkbox" name="weather" value="맑음">맑음</label>
<label><input type="checkbox" name="weather" value="비">비</label>

<br><br>

작물:
<label><input type="checkbox" name="crop" value="한라봉">한라봉</label>
<label><input type="checkbox" name="crop" value="천혜향">천혜향</label>

<br><br>

<button onclick="saveWork()">저장</button>

</div>

<!-- 리스트 -->
<div id="list"></div>

</div>

<script>

let selected = null
let editMode = false

function getChecked(name){
    return Array.from(document.querySelectorAll("input[name="+name+"]:checked"))
    .map(x=>x.value)
}

function openCreate(){
    editMode = false
    selected = null
    document.getElementById("editor").style.display="block"
}

function editWork(){
    if(!selected){ alert("선택 먼저"); return }
    editMode = true
    document.getElementById("editor").style.display="block"
    document.getElementById("task").value = selected.작업내용
}

function saveWork(){

    let data = {
        작업내용: document.getElementById("task").value,
        날씨: getChecked("weather"),
        작물: getChecked("crop"),
        사용자재:[]
    }

    if(editMode && selected){
        fetch("/api/works",{
            method:"DELETE",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                날짜:selected.날짜,
                작업내용:selected.작업내용
            })
        })
    }

    fetch("/api/works",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    }).then(()=>{
        alert("저장완료")
        loadList()
        document.getElementById("editor").style.display="none"
    })
}

function deleteWork(){
    if(!selected){ alert("선택 먼저"); return }

    fetch("/api/works",{
        method:"DELETE",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            날짜:selected.날짜,
            작업내용:selected.작업내용
        })
    }).then(loadList)
}

function loadList(){
    fetch("/api/works_light")
    .then(r=>r.json())
    .then(data=>{
        let html=""
        data.forEach(d=>{
            html+=`
            <div class="card" onclick="select(this, '${d.날짜}', '${d.작업내용}')">
                ${d.작업내용} (${d.날짜})
            </div>`
        })
        document.getElementById("list").innerHTML=html
    })
}

function select(el, date, task){
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"))
    el.classList.add("selected")

    selected = {
        날짜:date,
        작업내용:task
    }
}

loadList()

</script>

</body>
</html>
