<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>작업일지</title>
<style>
body { margin:0; font-family:sans-serif; }
.top-fixed {
  position: sticky;
  top: 0;
  background:#fff;
  padding:10px;
  border-bottom:1px solid #ccc;
  z-index:1000;
}
.scroll-btn {
  position:fixed;
  right:20px;
  z-index:9999;
  padding:10px;
}
#btn-top { bottom:80px; }
#btn-bottom { bottom:20px; }
</style>
</head>
<body>

<div class="top-fixed">
  <button id="btn-new-work">+ 새 작업 입력</button>
  <button id="btn-add-material">+ 자재 추가</button>
</div>

<div style="height:2000px; padding:20px;">
  내용 영역 (스크롤 테스트)
</div>

<button id="btn-top" class="scroll-btn">↑</button>
<button id="btn-bottom" class="scroll-btn">↓</button>

<script src="/static/app.js"></script>
</body>
</html>
