<!-- 🔥 기존 index.html 전체 덮어쓰기 -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>작업일지</title>

<style>
body { margin:0; font-family:맑은고딕; display:flex; }

.sidebar {
  width:220px; background:#1f2937; color:#fff; padding:15px;
}
.menu-btn {
  display:block; width:100%; margin-bottom:10px;
  padding:10px; border:none; background:#374151; color:#fff;
  border-radius:8px; cursor:pointer;
}
.menu-btn.active { background:#2563eb; }

.content { flex:1; padding:20px; }

.work-card {
  background:#fff; padding:15px; border-radius:12px;
  margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.btn { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }
.btn.primary { background:#2563eb; color:#fff; }
.btn.success { background:#16a34a; color:#fff; }
.btn.danger { background:#dc2626; color:#fff; }

.modal {
  display:none;
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:#fff;
  width:90%; max-width:600px;
  margin:40px auto;
  padding:20px;
  border-radius:12px;
}

.checkbox-group label {
  display:inline-block;
  margin:5px;
}
</style>
</head>

<body>

<!-- 좌측 -->
<div class="sidebar">
  <button class="menu-btn active">작업일지</button>
  <button class="menu-btn">자재관리</button>
  <button class="menu-btn">옵션관리</button>
</div>

<!-- 본문 -->
<div class="content">

  <h2>작업일지</h2>

  <!-- 버튼 -->
  <button class="btn primary" onclick="openWorkModal()">새 작업 입력</button>

  <!-- 작업 리스트 -->
  <div id="workList"></div>

</div>

<!-- 🔥 팝업 -->
<div id="workModal" class="modal">
  <div class="modal-box">

    <h3>작업 입력</h3>

    <!-- 작물 -->
    <div>
      <b>작물 (다중선택)</b>
      <div id="cropMulti" class="checkbox-group"></div>
    </div>

    <!-- 병충해 -->
    <div>
      <b>병충해 (다중선택)</b>
      <div id="pestMulti" class="checkbox-group"></div>
    </div>

    <!-- 사용기계 -->
    <div>
      <b>사용기계</b><br>
      <input id="machine_name" placeholder="기계명">
      <select id="machine_type">
        <option>구매</option>
        <option>대여</option>
        <option>사용</option>
        <option>반납</option>
        <option>반품</option>
      </select>
    </div>

    <!-- 결제 -->
    <div>
      <b>결제방식</b><br>
      <select id="payment_type" onchange="toggleCardOption()">
        <option>현금</option>
        <option>외상</option>
        <option>계좌이체</option>
        <option>카드</option>
      </select>

      <select id="card_option" style="display:none;">
        <option>일시불</option>
        <option>할부</option>
      </select>
    </div>

    <br>

    <button class="btn success" onclick="saveWork()">저장</button>
    <button class="btn" onclick="closeWorkModal()">닫기</button>

  </div>
</div>

<script>

// 옵션 (임시)
const crops = ['한라봉','천혜향','유라조생'];
const pests = ['응애','진딧물','총채벌레'];

// 팝업 열기
function openWorkModal(){
  document.getElementById("workModal").style.display="block";
  renderOptions();
}

// 팝업 닫기
function closeWorkModal(){
  document.getElementById("workModal").style.display="none";
}

// 카드 옵션
function toggleCardOption(){
  let v = document.getElementById("payment_type").value;
  document.getElementById("card_option").style.display = (v=="카드") ? "block":"none";
}

// 옵션 렌더
function renderOptions(){
  document.getElementById("cropMulti").innerHTML =
    crops.map(c=>`<label><input type="checkbox" value="${c}"> ${c}</label>`).join('');

  document.getElementById("pestMulti").innerHTML =
    pests.map(p=>`<label><input type="checkbox" value="${p}"> ${p}</label>`).join('');
}

// 저장
function saveWork(){

  let crop = [...document.querySelectorAll('#cropMulti input:checked')]
    .map(v=>v.value).join(',');

  let pest = [...document.querySelectorAll('#pestMulti input:checked')]
    .map(v=>v.value).join(',');

  let data = {
    날짜:new Date().toISOString().slice(0,10),
    작물:crop,
    병충해:pest,
    기계:document.getElementById("machine_name").value,
    구분:document.getElementById("machine_type").value,
    결제:document.getElementById("payment_type").value,
    카드:document.getElementById("card_option").value
  };

  fetch('/api/works',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).then(()=>{
    closeWorkModal();
    loadWorks();
  });
}

// 리스트 로드
function loadWorks(){
  fetch('/api/works_light')
    .then(r=>r.json())
    .then(data=>{
      let html='';
      data.forEach(w=>{
        html+=`
        <div class="work-card">
          <b>${w.작업내용 || '-'}</b><br>
          작물: ${w.작물 || '-'}<br>
          병충해: ${w.병충해 || '-'}<br>
          <button class="btn danger" onclick="deleteWork('${w.날짜}','${w.작업내용}')">삭제</button>
        </div>`;
      });
      document.getElementById("workList").innerHTML=html;
    });
}

// 삭제
function deleteWork(date,task){
  fetch('/api/works',{
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({날짜:date,작업내용:task})
  }).then(loadWorks);
}

loadWorks();

</script>

</body>
</html>
